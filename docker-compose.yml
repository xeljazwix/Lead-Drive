version: '3.8'

services:
  api:
    build: .
    container_name: leaddrive-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - STORAGE_DIR=/app/storage
    volumes:
      - ./storage:/app/storage
      - ./.vapid.json:/app/.vapid.json
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: leaddrive-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-leaddrive}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-leaddrive_secure_pass}
      - POSTGRES_DB=${POSTGRES_DB:-clouddrivedb}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leaddrive} -d ${POSTGRES_DB:-clouddrivedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
