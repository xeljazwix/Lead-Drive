# ─── Minimal ClamAV Daemon Config ────────────────────────────────────────────
# Configures clamd to listen on TCP port 3310 (for Node.js clamscan connection)
#
# NOTE: The word "Example" must NOT appear uncommented — ClamAV uses it as a
# sentinel to detect uncustomized configs and will refuse to start if present.

# ─── Networking ──────────────────────────────────────────────────────────────
TCPSocket 3310
TCPAddr 0.0.0.0

# ─── Paths ───────────────────────────────────────────────────────────────────
DatabaseDirectory /var/lib/clamav
TemporaryDirectory /tmp
PidFile /tmp/clamd.pid

# ─── Performance ─────────────────────────────────────────────────────────────
MaxThreads 4
MaxConnectionQueueLength 100
ReadTimeout 300

# ─── Size Limits ─────────────────────────────────────────────────────────────
# StreamMaxLength: max bytes accepted via INSTREAM command.
# MUST be set — if absent, ClamAV defaults to 0 which rejects ALL instream scans.
# Set to match the app's 2 GiB upload limit.
StreamMaxLength 2000M

# Max size of a single file to scan (raise to match upload limit).
MaxFileSize 2000M

# Max total bytes scanned (including unpacked archives).
MaxScanSize 2000M

MaxRecursion 16

# ─── Logging ─────────────────────────────────────────────────────────────────
LogVerbose false
LogTime true
LogClean false

